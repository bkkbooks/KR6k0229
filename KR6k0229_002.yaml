body:
  text: 清古杭昭慶寺傳律沙門書玉記正授本法尼大戒具十八法初先陳乞戒法尼至寺中先見知客師通會衆引禮師往方丈請和尚登座然後令尼和尚至座前向上立九師後排一班問訊展大具至誠頂禮三拜問訊長跪合掌尼和尚白云我某甲等奉和尚慈命差委將諸沙彌尼先授本法彼某甲等自説清淨無有難遮年歲已滿衣鉢具足我等和合授本法竟今詣座前乞受大戒惟願和尚慈悲濟下情無任懇禱之至一齊起立頂禮三拜起具問訊左右分立次尼引禮師亦向上排班頂禮三拜起具問訊傍立比丘引禮師云諸本法尼等一齊向上排班問訊展大具聞磬聲頂禮三拜撩衣拜已問訊長跪合掌和尚云二部授具律制森嚴必集清淨僧伽各滿十衆緣成方許授受少有乖違便名非法然師長雖具尤恐汝等身有難遮又受不得既然身器清淨已受本法則大戒堪容俟候登壇引禮呼云一齊起立聞磬聲禮謝三拜撩衣拜已起具問訊分班尼引禮仍向上一拜尼十師亦向上一拜然後各回以俟受戒二敷設壇儀法引禮師先令人灑掃戒壇周圍懸挂瓔珞幢幡壇上正中設和尚座座傍安一香几中輔設羯磨座兩傍設教授尊證座壇下正中設香案供列香花近壇左右各敷高臺與壇二級相等尼和尚座面南餘向壇又於法堂正中設和尚座左五右四設九師座八字分開引禮師請問和尚作法時節以便鳴椎集衆三鳴椎集衆法時至引禮師令鳴鐘三下戒壇燃燭本法尼各各披搭三衣聽鉢執具其尼引禮師領彼魚貫而出行至法堂各歸班立內外大僧盡齊集已引禮師呼云一齊向上排班作禮大僧三拜撩衣護鉢拜已起具問訊分班尼引禮師二位出班居中向上同四新戒一問訊領彼請尼十師至法堂十師先向大僧一拜左右班列比丘引禮師云一齊向上排班作禮本部諸師三拜撩衣護鉢師答云一拜起具問訊分班尼十師分開邊立二比丘引禮師出班居中向上同新戒四人一問訊轉身去請七師至法堂新戒歸班引禮復位七師分開引禮師呼云一齊向上排班作禮諸師三拜撩衣護鉢師答云一拜起具問訊分班又二引禮出班向上問訊引四新戒往兩寮分請二師同至法堂新戒歸班引禮復位九師相會同一拜已左右序立引禮師呼云一齊向上排班作禮二師三拜撩衣護鉢羯磨師云一拜起具問訊分班二引禮雙鳴引磬同新戒六人往方丈請和尚二押班隨後至方丈已引禮師知會侍司請和尚出引禮師呼云一齊向上排班聞磬聲至誠頂禮三拜撩衣護鉢尚云一拜起具問訊分班引禮云末後先行領班引禮云隨我走師轉身領新戒前行引磬在和尚前將至法堂九師對面而立新戒歸班引禮復位和尚到已九師向上展具三拜尚云不展具一拜尚云各序坐其尼部十師向上排班問訊展具一齊頂禮三拜九師立起尚云不展具一拜問訊歸位四正明請師法如律所明本法尼止請羯磨師餘無請法然開道戒體傳宣聖教必由和尚指示律儀務須教授羯磨成壞重在七師今以理推之故須伸請引禮師云諸本法尼等一齊向上排班問訊展大具聞磬聲至誠頂禮三拜撩衣護鉢拜已問訊長跪合掌引禮師合掌白云夫明鏡當臺遇形則鑑洪鐘在架有扣則鳴圓成三聚須假於三師舉撿七非全憑於七證今在此大僧之中為汝等恭請十師登壇受具諸本法尼一齊擡頭認師各各記取得戒和尚及現前諸師相貌名字不得忘失第一位上某下某律師為汝等作具足戒和尚右班引禮云第二位某甲律師為汝等作羯磨阿闍黎左班引禮云第三位某甲律師為汝等作教授阿闍黎右班引禮云第四位某甲律師為汝等作尊證阿闍黎乃至第十位左右引禮亦如是宣名示相令諸求戒者一一記識分明如是宣已左班引禮呼云一齊起立聞磬聲至誠頂禮三拜撩衣護鉢長跪合掌左班引禮師云諸本法尼今為汝等恭請某堂上上某下某律師為汝等作具足戒和尚請師之語汝合自陳恐汝未能我今教汝各稱法名稱已其餘言詞皆隨我道大德一心念我本法尼某甲等今請大德為具足戒和尚願大德為我作具足戒和尚我依大德故得受具足戒慈愍故如是至誠三請三叩首和尚云諸本法尼汝既殷勤伸請可爾為汝等作具足戒和尚汝等受戒之後人人要清淨守持不可毀犯答頂戴受持引禮呼云一齊起立聞磬聲至誠頂禮三拜撩衣護鉢拜已問訊長跪合掌右班引禮云諸本法尼今為汝等恭請現前諸師作羯磨阿闍黎教授阿闍黎尊證阿闍黎請師之語汝合自陳恐汝未能我今教汝各稱法名稱已其餘言詞皆隨我道大德一心念我本法尼某甲等今請大德為羯磨教授尊證阿闍黎願大德為我作羯磨教授尊證阿闍黎我依大德故得受具足戒慈愍故三請三叩首羯磨師云諸本法尼汝既殷勤伸請我現前諸師為汝等作羯磨阿闍黎教授阿闍黎尊證阿闍黎可爾汝等受戒之後人人清淨莫放逸答依教奉行引禮師云一齊起立聞磬聲作禮三拜撩衣護鉢拜已起具問訊分班和尚云大衆念佛登壇南無本師釋迦牟尼佛佛號方舉法鼓大擂二引禮雙鳴引磬領站班大僧前行又二引禮雙鳴引磬引新戒序前而行新戒走完尼十師未後前行接上而去然後一執香者在七師前行一執香者在教授師前行二引禮雙鳴引磬及一執香者俱在和尚前行侍者隨後大僧及新戒至戒壇左右班立引禮復位尼十師在階前對面而立三執香者又次之和尚近香案前佛號鼓聲一齊停止五祝延聖壽法維那舉讚大衆同和寶鼎熱名香普遍十方虔誠奉獻法中王端為皇王祝聖壽地久天長端為皇王祝聖壽地久天長南無香雲蓋菩薩摩訶薩三稱和尚拈香三拜一問訊念第二聲香雲蓋九師在和尚後一班展大具脫革屣尼十師又次一班亦展大具念第三聲菩薩完鐘魚隨煞一陳六讚禮三寶法稽首禮諸佛及法賢聖僧二十師同一拜大衆接和今演毗尼法續僧伽命脈如前正法得久住三乘果不絶大衆接和師拜起具將登清淨壇願證明所説師口稱偈執具問訊七升壇白衆法讚禮三寶畢維那舉大悲呪大衆齊聲朗誦第十師從東南轉身向西繞壇次九師八師乃至第一師走完尼十師移至近檻對面班立但合掌持呪不必隨繞壇內十師繞三匝半二遍呪完脫屣升中級繞一匝半至東南角上壇第十師在左班尾立面向第一師來處第九師至右班尾立第八師在左班面向和尚來處立第七師至右班立第六師至左班立乃至第一師上壇面南而立三遍呪完鐘魚隨煞一陳其九師向上排班前五後四尼和尚近香案前立餘尼九師後立排班向尚合掌同念壇上第一師舉云持戒清淨如滿月十九師向尚一拜大衆接和答禮準前身口皎潔無瑕穢同前大衆和合無疑諍諸師拜下起具是乃可得同授戒諸師口稱執具問訊諸師和合舉偈三禮竟鐘魚長煞一陳十師各序坐尼十師上臺亦各序坐和尚撫尺云法音罕遇戒德難思能超凡鄙穢流可入聖賢寶位為師為匠誠易誠難爐韛弘開人根須鍊受持禁戒衣鉢應嚴如無衣鉢莫容缺借前言重難後列輕遮問若不解不知勤勞徒設信其實語實答陶誘得方令發上品真誠要期塵境圖使十方善法灌注身心五分基成三身體具謹白臨壇大衆同心共秉慎勿異緣撫尺一下引禮云諸本法尼等人各照位依次排班左右為首本法尼從上而下餘者雁行相隨至壇前面分班順次立定引禮云上香執香三人齊眉一舉轉身向上並立又一舉具儀並進第一位走中門餘二人走兩頰門並至香案前又一舉右手提衣跪下二引禮站在案前為首執香者自插爐中餘二人作插香勢二引禮接彼香插爐中云起立問訊復位引禮云一齊向上排班問訊展大具尚云免展具聞磬聲至誠頂禮三拜二部師合掌受禮撩衣護鉢拜已問訊長跪合掌七請慈加護法和尚撫尺云諸本法尼今者集僧登壇依律傳戒理當通啓三寶乞求加被各稱法名稱已作觀運心隨我通請引禮云一齊起立十師起座壇主舉香碟齊眉作梵九師同請一侍者合掌與羯磨師對面立一侍者立壇前第二級二引禮立香案內俱合掌同請尼十師亦然香煙迎香煙請本法尼某甲等一心奉請娑婆教主本師釋迦牟尼佛西方接引阿彌陀佛當來下生彌勒尊佛盡虗空遍法界一切諸佛惟願不違本誓慈光攝照證明受戒和尚拈香一瓣傳於侍者侍者接香傳至第二級侍者第二級侍者傳於引禮引禮接香拈在爐中求具本法尼隨其所請一拜起立須知能所空寂感應道交香煙迎香煙請本法尼某甲等一心奉請大小二乘毗尼律藏五篇三聚解脫木叉十二分經權實教典離欲真淨甚深法寶謹運一心歸命頂禮儀式如前香煙迎香煙請本法尼某甲等一心奉請觀音勢至文殊普賢清淨海衆諸大菩薩律藏會上優波離尊者西天東土歷代祖師傳南山宗諸大律師中興律祖慧雲馨公大和尚弘傳戒法三昧光公大和尚中興止作見月體公老和尚此下復續八座上師之得戒本師和尚諱惟願不違本誓慈光攝照證明受戒如前香煙迎香煙請本法尼某甲等一心奉請光明會上寄位諸天梵釋四王天龍八部伽藍上地護戒神王金剛力士幽顯靈祇惟願各乘本誓監壇護戒如是伸請已畢十師就座而坐侍者下壇引禮復位新戒拜已引禮云問訊長跪雙手牽衣合掌和尚撫尺云通啓三寶已竟諸引禮大德將彼等安見不聞處立引禮云一拜起具問訊分班二引禮對立班前作如是言諸本法尼汝等隨我音聲一齊念佛出壇向上一問訊雙鳴引磬齊念南無本師釋迦牟尼佛如是次第引本法尼至屏教所引禮仍回僧中如律所明戒壇乃是非師不與之地惟是十師同秉惟受比丘尼大戒不遮衆人但是受具足戒者俱聽隨喜十僧集問和法壇主云僧集否第十師答僧已集和合否和合未受具戒者出否是中無有未受具戒者謂本法尼已受具故僧今和合何所作為受比丘尼大戒羯磨集僧已竟其引禮師至屏教所引三人近戒壇令本法尼止立瞻觀壇上生難遭之想恭敬之心引禮居中向上一問訊合掌如是白云十一白召乞戒法大德僧聽彼本法尼某甲等今從大僧乞受大戒一問訊壇主云喚將來引禮轉身招手召云諸本法尼汝等來諸尼聞召具儀前行入壇師移步至香案側立語云汝等一齊近香案前到已問訊長跪居中者拈香一瓣供養壇上諸師拈香已一拜而起再問訊隨我送汝登壇乞戒引禮先行三人次第隨去至壇後脫履尼教授師引彼登壇三人上壇齊立尼教授師側立於傍呼云問訊展大具展已云至誠頂禮三拜撩衣護鉢拜已問訊長跪雙手牽衣跪下合掌尼教授師合掌作如是言善女人等懇切至誠仰憑清衆求哀乞戒乞戒之語汝當自陳恐汝未能我今教汝各稱法名稱已其餘言詞皆隨我道大德僧聽我本法尼某甲從和尚尼上某下某律師求受大戒我本法尼某甲今從大僧乞受大戒和尚尼上某下某律師願僧濟我慈愍故三説已云頂禮一拜擡起頭來作持云尼教授師教乞戒已當下壇復座十二單白問難法羯磨師於本座合掌白云大德僧聽此本法尼某甲等從和尚尼某甲律師求受大戒此某甲等今從大僧乞受大戒和尚尼某甲律師若僧時到僧忍聽我問諸難事白如是問云作白成否七師合掌答云成五分律云當安慰彼言族姓女諦聽汝莫恐怖須臾之間令汝三人行清淨戒成大比丘尼入僧寶數也羯磨師合掌問云汝三人諦聽今是真誠時我今問汝有當言有無當言無汝三人不犯邊罪耶答無汝不犯比丘耶答無汝非賊心為道耶答非汝非壞二道耶答非汝非黃門耶答非汝非弒父耶答無汝非弒母耶答無汝非弒阿羅漢耶答無汝非破和合僧耶答無汝非惡心出佛身血耶答無汝非非人耶答非汝非畜生耶答非汝非二根耶答非並令識相分明顯答以不解故無由得戒也汝字何等答某甲和尚字誰答上某下某大和尚年歲滿不答滿衣鉢具足不答具父母夫主聽汝不答聽汝不負人債不答無汝非婢不答非汝是女人不答是女人有如是諸病癩癰疽白癩乾痟顛狂汝無如是諸病不答無準僧祗律二根二道合道小大小便涕唾常出不必問謂難中已有故汝學戒未答已學戒清淨不答清淨復應問餘尼言某甲已學戒未餘尼答言已學戒清淨未餘尼答言清淨十三開道發心法和尚云善女人前無重難後無輕遮甚是淨器衆僧同慶當授汝戒但深戒上善廣周法界量等虗空今欲進受要須緣境發心心境相容方發無作薩婆多論云凡欲受戒先與説法引導開解汝三人從無始以來於一切境上造諸惡業惡遍法界今欲受戒翻前惡境並起善心故戒法所因還遍法界故我釋迦如來隨衆生心造無邊之業制無邊之戒戒隨所制故須緣境境量雖多舉要而言不出乎二種一者情境二者非情境言情境者上至諸佛下至衆生十界正報中陰有情凡有心者皆名情境非情境者十界依報一切世間山河大地草木叢林舟車屋宅珍寶田園地水火風乃至虗空佛説聖教儒流文字形像塔廟等皆名非情境善女人既知境量如此寬廣當須依境發心心有三品中下二心劣弱非勝但能自度不能度人我今教汝發上品心求上品戒何為上品心今於我諸師座前立三種誓願一者誓斷一切惡無惡不斷二者誓修一切善無善不修三者誓度一切衆生無一衆生不度發此三種大誓願已於白四羯磨言下進受大比丘尼戒不為但求聲聞小果故直欲成就三聚淨戒故趣向三解脫門故正求佛果求大涅槃令法久住故發如是上品心受上品戒次當開廣汝懷者良由戒法體周法界量等塵沙終不以汝三人現前父母所生報得狹劣身心而能容受當作虗空器量之身方能領納塵沙戒法故論云若此戒法有形色者入汝身時當作天崩地裂之聲由是非色法故令汝不覺不知當起警懷之意發上品殷重之心領納如來清淨妙戒鳴尺一下今正為汝等白四羯磨受大比丘尼戒汝等當眼觀壇儀耳聽羯磨一心諦受莫餘思餘覺羯磨師先作一白疊事告知次秉三羯磨量其可否十四正受戒體法羯磨師合掌云性願和尚大衆不吝慈悲布施其戒同心共秉慎勿異緣令此三人感發圓宗戒體將秉羯磨聽宣作白大德僧聽此本法尼某甲等從和尚尼某甲律師求受大戒此某甲等今從大僧乞受大戒和尚尼某甲律師某甲等所説清淨無諸難事年歲已滿衣鉢具足已學戒清淨若僧時到僧忍聽僧今為某甲等受大戒和尚尼某甲律師白如是問作白成否七師合掌齊答云成大德僧聽此本法尼某甲等從和尚尼某甲律師求受大戒此某甲等今從大僧乞受大戒和尚尼某甲律師某甲等所説清淨無諸難事年歲已滿衣鉢具足已學戒清淨僧今為某甲等受大戒和尚尼某甲律師誰諸長老忍僧與某甲等受大戒和尚尼某甲律師者默然誰不忍者説是初羯磨成否如前答成大德僧聽此本法尼某甲等從和尚尼某甲律師求受大戒此某甲等今從大僧乞受大戒和尚尼某甲律師某甲等所説清淨無諸難事年歲已滿衣鉢具足已學戒清淨僧今為某甲等受大戒和尚尼某甲律師誰諸長老忍僧與某甲等受大戒和尚尼某甲律師者默然誰不忍者説是二羯磨成否如前答成大德僧聽此本法尼某甲等從尚和尼某甲律師求受大戒此某甲等今從大僧乞受大戒和尚尼某甲律師某甲等所説清淨無諸難事年歲已滿衣鉢具足已學戒清淨僧今為某甲等受大戒和尚尼某甲律師誰諸長老忍僧與某甲等受大戒和尚尼某甲律師者默然誰不忍者説是三羯磨成否如前答成僧已忍為某甲等受大戒竟和尚尼某甲律師僧忍默然故是事如是持十五示記時節法作持云所以本法羯磨但作方便未是示語時節者非正受具故又二部僧不滿二十衆故和尚語言白四羯磨已竟汝三人已得比丘尼戒體了記汝受戒年月日時以便本部中好分上中下座汝三人得戒在干康熙某年某月某日某時受具足戒第几壇十六傳授戒相法族姓女諦聽此是如來無所著等正覺説八波羅夷法若比丘尼犯一一法此非比丘尼非釋種女第一不得作不淨行行淫欲法若比丘尼意樂作不淨行行淫欲法乃至共畜生此非比丘尼非釋種女汝是中盡形壽不得犯能持否答能持第二不得盜乃至草葉若比丘尼偷人五錢若過五錢若自取教人取若自斷教人斷若自破教人破若燒若埋若壞色彼非比丘尼非釋種女汝是中盡形壽不得犯能持不答能持第三不得故斷衆生命乃至蟻子若比丘尼故自手斷人命若持刀與人教死讚死若與非藥若復墮人胎厭禱呪咀殺若自作教人作彼非比丘尼非釋種女汝是中盡形壽不得犯能持否答能持第四不得妄語乃至戲笑若比丘尼非真實非己有自稱言我得上人法我得禪得解脫三昧正受須陀洹果斯陀含果阿那含果阿羅漢果天來龍來鬼神來供養我此非比丘尼非釋種女汝是中盡形壽不得犯能持否答能持第五不得身相觸乃至共畜生若比丘尼有染污心與染污心男子身相觸從腋以下膝以上若捺若摩若牽若推若逆摩順摩若舉若下若捉若急捺此非比丘尼非釋種女汝是中盡形壽不得犯能持否答能持第六不得犯八事乃至共畜生若比丘尼受染污心男子捉手捉衣入屏處共立共語共行身相近共期犯此八事彼非比丘尼非釋種女犯八事故汝是中盡形壽不得犯能持否答能持第七不得覆藏他罪乃至突吉羅惡説若比丘尼知他比丘尼犯波羅夷罪若不自舉不白僧若衆多人後於異時此比丘尼若罷道若滅擯若遮不共僧事若入外道後便作是説我先知有如是如是事彼非比丘尼非釋種女覆藏重罪故汝是中盡形壽不得犯能持否答能持第八不得隨舉比丘乃至守園人及沙彌若比丘尼知比丘為僧所舉如法如律如佛所教不隨順不懺悔僧未與作共住而隨順是比丘尼諫是比丘尼言汝妹知不今僧舉此比丘如法如律如佛所教不隨順不懺悔僧未與作共住汝莫隨順是比丘尼諫是比丘尼時堅持不捨是比丘尼當三諫捨此事故乃至三諫捨者善不捨者彼非比丘尼非釋種女由隨舉故汝是中盡形壽不得犯能持否答能持五分律云説八重已總説四喻應如是告言族姓女聽如來無所著已説八波羅夷又説四種譬喻若犯八重如斷人頭已不可復起又如截多羅樹心不更生長又如針鼻缺不堪復用又如析大石分為二分不可還合若比丘尼犯八重已不得還成比丘尼行汝是中盡形壽不得犯能持不答能持十七後説四依法又應告言族姓女聽如來無所著等正覺説四依法比丘尼依此得出家受大戒成比丘尼法第一比丘尼依糞掃衣得出家受大戒成比丘尼法汝是中盡形壽能持不答能持若得長利檀越施衣割壞衣得受第二比丘尼依托鉢乞食得出家受大戒成比丘尼法汝是中盡形壽能持不答能持若得長利若僧差食檀越送身月八日食十四日食十五日食若月初日食若衆僧常食若檀越請食應受第三比丘尼依樹下坐得出家受大戒成比丘尼法汝是中盡形壽能持不答能持若得長利別房尖頭屋小房石室兩房一戶得受第四比丘尼依腐爛藥得出家受大戒成比丘尼法汝是中盡形壽能持不答能持若得長利酥油生酥蜜石蜜應受律中因比丘尼獨住阿蘭若有難事起佛已遮不聽樹下坐今仍以舊文説者令彼知四依法故汝三人受大戒已竟白四羯磨如法成就得處所和尚如法阿闍黎如法二部僧具足滿汝當善受教法應勸化作福治塔供養衆僧若和尚阿闍黎一切如法教授不得違逆應學問誦經勤求方便於佛法中得須陀洹果斯陀含果阿那含果阿羅漢果汝始發心出家功不唐捐果報不絶餘所未知當問和尚阿闍黎一拜起具上殿禮佛新戒執具從西南角至壇後而下第二壇乃至末壇亦如是次第受已和尚云受戒已竟大衆同音念佛回向新戒執具下壇尼十師先下座分立十八回向出壇法引禮云一齊向上排班聞磬聲頂禮三拜撩衣拜已起具問訊分班壇上九師分排兩班前五後四尼十師亦向上排班前一後九向上頂禮三拜或一拜問訊已尼十師退出簷下壇上十師末後先行從右級下壇向東北繞至壇前第一師前一班九師次之尼十師又次之維那舉偈云受戒功德殊勝行無邊勝福皆回向師同一拜普願沉溺諸有情速往無量光佛剎同前十方三世一切佛一切菩薩摩訶薩同前摩訶般若波羅蜜二十師問訊分班對立和尚轉面南立二引禮師先引新戒末後先行新戒走完尼十師末後先行接上大僧九師亦末後先行接上引禮雙鳴引磬在和尚前行新戒至方丈前兩行合掌面面對跪候諸師行過仍起雙行至方丈班列和尚面南十九師向上排班三拜或一拜八字分開引禮呼云一齊向上排班聞磬聲禮謝三拜師具合掌撩衣拜已起具問訊分班和尚入室諸師各散新戒再禮謝引禮師已然後次序歸堂跋是儀式也目之極易而行之實難若非具大根器得大忍力者不能信是法也佛謂女人惑亂多諸煩惱或因瞋起而障精進修持或因慢生而障如法授受因此煩惱惑亂心田便障聖道所以佛姨母大愛道與五百釋種女詣祇桓門外求度出家佛不聽許大愛道等步涉腳裂塵土坌身悲泣不去阿難見愍三請如來佛慈為彼制八敬法語言若能盡壽行持聽汝出家阿難依教傳宣愛道等三答頂戴奉行而尼部自斯建立後制二十僧尼白四受具故論云由尼等奉行八敬能令如來正法不減也於戲末法受戒尼如麻似粟若欲覓箇知八敬者尚不可得何況行持梵網經云一切衆生皆有佛性有佛性者皆得作佛大涅槃云一切衆生雖有佛性要因持戒然後乃見又云女人得佛性者即為女中丈夫今巨源和尚是其人也能行八敬依律師人復同其兄翰屏周居士請緒此儀以壽梨棗吾知二公不自為也欲令人人如法授受久住毗尼者矣其為法之心當共垂不朽二月二日閣筆故跋
