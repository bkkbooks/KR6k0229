front:
  text: 二部僧授戒儀式緣起清古杭昭慶寺傳律沙門書玉述律云式叉摩那學戒已從比丘僧乞受大戒此是如來成道十四年間度大愛道等出家金口親宣八敬中第四法也由是式叉尼學戒已必集二十衆清淨僧尼授具足戒若少一人作法不成授者結罪謂衆不滿數不能令尼感發增上戒故其諸儀法結在律藏南山宣祖刪繁取要集為行本名曰隨機羯磨就其時用復撰事鈔以悉其文自唐迄今千有餘載事鈔板失止存羯磨而行者殊難先師見老和尚中興止作重復釋之發隱加儀則事理明矣丁未春崑山蜜照尼和尚同徐太夫人上山設供衆學戒女隨來求具行持半月略諳威儀先老人命蜜照尼為和尚揚州超塵尼為羯磨真州圓證尼為教授遴選德臘尼為七證統諸受戒尼四十餘位出界往山南一葉菴集彼部尼僧先授本法次日和尚尼鳴槌集衆通白如來教敕已同壇上九師領衆尼登山乞受大戒老人即集二部僧尼為彼作法圓具此是先老人二部僧為尼授戒之儀式也余雖未列其位然隨侍先人左右無法不從目過矣自後師資不偶授受惟從大僧亦由原仰先老人之法乳故蓋謂施法隨機不可勉也所以後來受戒者多未及見吾法侄松隱律師倣善導之高風勸修白業因緣時至道契寰中有尼和尚號巨源者係潭柘震和尚之嗣也以金剛身酬堅固願行頭陀行抖擻客塵三十年來如同一日其兄優婆塞翰屏周居士為須達長者後身篤信毗尼金湯佛法二人同出蒼林和尚之門見松公行來出入不失律儀遂紏諸檀護迎請到給孤精藍傳授三壇大戒壇場殊勝事事莊嚴四衆雲從嘆未曾有松公授比丘戒已復命巨源尼和尚冀率九位尼師成二部僧授尼大戒然松公為吾同門定和尚入室之子操持日久輔弼多年雖未見其本師所行而所作之法竟合我先老和尚成規寧非繼席寶華之兆也壬午冬巨翰二公南來參覲普門大士先到昭慶瞻禮古佛戒壇致問殷勤具陳上事渴慕先老人作法軌則恨未親見請述二部僧授戒儀式以證將來意欲令受大戒僧尼共覩如來聖制律法森嚴也諄諄再四理不容辭故將昔年所見之儀録成一冊以奉觀覽其間若事若法俱出傳戒作持如東坡云花落花存吾未知也時康熙四十二年歲次癸未上元吉旦二部僧授戒儀式凡例十二則佛制僧居必先結界若不結界一切作法等事咸無成濟之功衆僧得罪又五分云義准尼僧自結大界以護別衆故二部十師必須精嚴如法知律僧尼非謂頭數滿足而已主法者宜先稱量二部執事各有所屬不宜溷雜尼授本法惟用尼司至大僧中比丘方為料理二部授戒重在大僧尼授本法俱遵大僧儀式不得隨世所行有違佛制尼受大戒必在二部僧中方為如法先於本部審過懺悔授與十支或六法戒所學清淨生增上心次授本法然後從比丘僧乞受大戒入三寶數也今雖從權受者多然亦須知律法森嚴也如律所明不受沙彌尼十戒而受具足戒者無有是處故文中疊出沙彌尼字以顯階級不亂也獨授戒法原無等字三人一壇名衆難疊故加等字以攝餘二人也尼授尼戒屏處問遮比丘授尼戒不聽屏處問難惟到壇上十師前問也本法羯磨但作方便未是示語時節故戒相不宣此有二意一非正授具故二二部僧不滿二十衆故大僧中授戒稱本法尼者令位次不廢故不稱沙彌尼者先受本法故不稱比丘尼者尚未得大戒故律法乃如來所制呼召是攝衆之規俱書大字頂格儀式皆低一字以便披覽律開邊方授具二部減半謂衆僧難得故其受法禮儀准此無異
