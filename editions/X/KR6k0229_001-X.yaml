body:
  text: 清古杭昭慶寺傳律沙門書玉記授本法尼戒具十八法初淨壇敷座法式叉摩那或沙彌尼學戒年滿欲受大戒時先徃大僧中啟白和尚和尚允許先差尼部十師其尼部十師先到方丈頂禮和尚已次領求戒尼至誠頂禮三拜然後出界作法至本部已必須如法習儀次第純熟其維那師令人灑掃戒壇若無戒壇必須搭就壇上中設正座座右安一小桌中鋪設第二座餘八座位左四右四對面而列正受具日懸掛旛幢寶蓋瓔珞壇下正中設一香案燃燭供花復於屏處設一問難小座次方請戒懺摩待回復已清淨無染俟候登壇二鳴椎集眾法其知事人先於法堂敷十師座第一座正中餘九座左五右四八字分開諸求戒尼各披五七二衣懸鉢持具手捧大衣知事人令鳴鐘三下諸求戒尼聞犍椎聲雁行而出齊集法堂左右班立尼引禮師先領二人至板堂禮佛一拜起立引禮師云請引禮師傅引贊師傅說已作禮一拜問訊先回法堂歸位其引禮師引贊師遂至法堂尼引贊師先為彼等收大衣已放於桌上本堂尼引禮師呼云一齊向上排班右班呼云作禮大僧三拜左云撩衣右云護鉢拜已左云起具右云問訊左云分班二引禮師向上同新戒一問訊引彼四人請七師來到法堂新戒歸位左班呼云一齊向上排班右班呼云作禮諸師三拜左云撩衣右云護鉢七師首位云一拜左云起具右云問訊左云分班二引禮師復出眾同四新戒齊向上一問訊各領二人至兩寮先應向羯磨師一觸禮請羯磨師出作如是言作禮羯磨師三拜撩衣護鉢師云一拜引禮云起具問訊分班教授寮亦如是說說已新戒前行教授師隨後引禮相照二師同至法堂新戒歸班引禮復位九師向上同一拜已左右序立引禮呼云一齊向上排班右云作禮二師三拜左班呼云撩衣右云護鉢羯磨師云一拜左云起具右云問訊左云分班二引禮鳴擊統六新戒或四人齊向上一問訊徃方丈請和尚二引禮押班九師對面班立引磬領新戒進方丈左右頰門至公位前班立押班者在門外引禮通會侍司請和尚出引禮呼云一齊向上排班右云聞磬聲至誠頂禮三拜左云撩衣右云護鉢尚云一拜左云起具右云問訊左云分班右云末後先行押班者領新戒出二引磬在和尚前侍者在後至法堂新戒復位引禮歸班和尚詣座九師向上展具三拜尚云不展具一拜拜已尚云各序坐九師坐已尼引禮師呼云諸沙彌尼若是學戒女則云諸式叉尼後皆同一齊向上排班右云問訊展大具如人多尚云免展具左云聞磬聲至誠頂禮三拜右云撩衣左云護鉢拜已右云問訊左云長跪右云合掌此三拜九師不須合掌左班尼引禮云夫明鏡當臺遇形則鑑洪鐘在架有扣則鳴圓成三聚須假於三師舉撿七非全憑於七證今在此大僧之中為汝等恭請十師登壇受具諸沙彌尼一齊擡頭認師各各記取得戒和尚及現前諸師相貌名號不得妄識第一位上某下某律師為汝等作具足戒尼和尚右班引禮云第二位某甲律師為汝等作尼羯磨阿闍黎左班引禮云第三位某甲律師為汝等作尼教授阿闍黎右班引禮云第四位某甲律師為汝等作尼尊證阿闍黎乃至第十位左右引禮亦如是舉名示相令諸求具者一一記識分明如是宣已左班引禮師呼云一齊起立右云聞磬聲頂禮三拜左云撩衣右云護鉢拜已左云長跪右云合掌三僧中請師法律云弟子無師教授故造作非法佛言當立和尚弟子看和尚當如父母想敬重瞻視和尚看弟子當如兒想撫育教誡善見律云以初不請故後便違教佛制令請也左班引禮云諸沙彌尼今為汝等恭請某堂上上某下某律師為汝等作具足戒尼和尚請師之語汝合自陳恐汝未能我今教汝各稱法名稱已其餘言詞皆隨我道大姉一心念我沙彌尼某甲等今請大姉為具足戒和尚願大姉為我作具足戒和尚我依大姉故得受具足戒慈愍故如是至誠三請三叩首和尚云諸沙彌尼汝既慇懃伸請可爾為汝等作具足戒和尚受戒之後人人要清淨守持不可毀犯答頂戴受持引禮師云一齊起立右云聞磬聲頂禮三拜左云撩衣右云護鉢拜已左云問訊右云長跪左云合掌右班引禮師云諸沙彌尼今為汝等恭請現前諸師作羯磨阿闍黎教授阿闍黎尊證阿闍黎請師之語汝合自陳恐汝未能我今教汝各稱法名稱已其餘言詞皆隨我道大姉一心念我沙彌尼某甲等今請大姉為羯磨教授尊證阿闍黎願大姉為我作羯磨教授尊證阿闍黎我依大姉故得受具足戒慈愍故三請三叩首第三遍當云大慈愍故前亦如是羯磨師云諸沙彌尼汝既慇懃伸請我現前諸師為汝等作羯磨阿闍黎教授阿闍黎尊證阿闍黎可爾汝等受戒之後人人清淨莫放逸答依教奉行引禮師云一齊起立右云聞磬聲作禮三拜左云撩衣右云護鉢拜已左云起具右云問訊左云分班諸引贊尼仍將各人大衣次第散還令彼自捧十師起座第一位師舉云南無本師釋迦牟尼佛佛號方舉法鼓大擂普眾同音一齊朗誦二引禮雙鳴引磬導前諸比丘尼走完又二引禮雙鳴引磬領新戒次第走已一人執香在第十師前行又一人執香在第三師前行又二引禮雙鳴引磬又一人執香在和尚前行侍者隨後大眾及新戒至壇左右班列三位執香者側立丹墀左防引禮歸位九師至香案前兩分序列第一師至居中向上法皷佛聲即止四祝延聖壽法准古壇儀登壇之始有祝延一科蓋僧弘佛法必藉外護故靈山會上世尊曾有付囑若違佛語而負國恩者恐教化難昌今則仍遵古壇儀範維那作梵舉祝延香讚大眾同和寶鼎爇名香普徧十方虔誠奉獻法中王端為皇王祝聖壽地久天長端為皇王祝聖壽地久天長南無香雲蓋菩薩摩訶薩三稱第一師恭謹拈香三拜默祝聖已五讚禮三寶法作法之始必先禮敬三寶者所以求其加被也念第二聲菩薩九師轉下在第一師後並排一班展大具讚禮三寶第一師先聲九師同讚稽首禮諸佛及法賢聖僧十師一拜大眾接和今演毗尼法續僧伽命脈如前正法得久住三乘果不絕大眾接和師拜起具將登清淨壇願證明所說十師口稱執具問訊六陞壇白眾法十師讚禮三拜畢維那舉大悲呪大眾齊聲朗誦第十師先轉身從東南向西繞壇次九師次八師乃至第一師末行繞三匝半二遍呪完脫履陞中級繞一匝半至東南角上壇第十師在左班尾立面向第一師來處第九師至右班列第八師至左班面向和尚來處第七師至右班列第六師至左班亦如是列乃至第一師上壇面向南而立三遍呪完鐘魚隨煞一陣九師向上排班前五後四第一師先聲九師同和持戒清淨如滿月九師向尚一拜大眾接和答禮准前可知身口皎潔無瑕穢同前大眾和合無疑諍九師拜下起具是乃可得同授戒九師口稱執具問訊十師和合三拜已舉偈方完鐘魚隨煞一陣十師各序坐和尚撫尺云出家不易受戒良難若非懇切勤求安能得趣亞位塵緣既割志願須堅慎始慎終方堪拔濟故我憍曇彌最初請度聖制無容勤求確志不移佛慈乃聽遵行八敬正法常存嚴整四儀僧倫衍慶登壇秉具衣鉢為先審問難遮要當實答今則先傳本法以為入道之基次方恭詣大僧而得解脫之本謹白臨壇大眾同心共秉慎勿異緣撫尺一下引禮云諸沙彌尼等人各照位依次排班左右為首沙彌尼從上而下餘者雁行相隨至壇前面分班順次立定引禮師云上香執香三人齊眉一舉轉身朝上並立又一舉具儀並進第一位走中門餘二人走兩頰門並至香案前又一舉右手提衣跪下二引禮站在香案內為首執香者自插爐中餘二人作插香勢二引禮接彼香插爐中云起立右云問訊左云復位壇上教授師云眾引贊大德為彼諸沙彌尼暫持袈裟以便頂禮引贊出眾收衣已引禮師云一齊向上排班右云問訊展大具尚云免展具左云聞磬聲至誠頂禮三拜右云撩衣左云護鉢拜已右云問訊左云長跪右云合掌七請慈加護法和尚撫尺云諸沙彌尼今者集僧登壇如律受具理當先祈三寶慈光攝照次屈萬靈威神鎮衛各稱法名稱已作觀運心隨我通請引禮云諸沙彌尼一齊起立十師起座壇主舉香碟齊眉作梵九師同和一侍者合掌與羯磨師對面立一侍者立壇前第二級二引禮立香案內合掌同請香煙迎香煙請沙彌尼某甲等一心奉請娑婆教主本師釋迦牟尼佛西方接引阿彌陀佛當來下生彌勒尊佛盡虗空徧法界一切諸佛惟願不違本誓慈光攝照證明受戒和尚拈香一瓣傳於侍者侍者接香傳至第二級侍者侍者又傳至引禮引禮接香拈在爐中求具沙彌尼隨其所請一拜起立須知能所空寂感應道交香煙迎香煙請沙彌尼某甲等一心奉請大小二乘毗尼律藏五篇三聚解脫木叉十二分經權實教典離欲真淨甚深法寶謹運一心歸命頂禮儀式如前香煙迎香煙請沙彌尼某甲等一心奉請觀音勢至文殊普賢清淨海眾諸大菩薩律藏會上優波離尊者西天東土歷代祖師傳南山宗諸大律師中興律祖慧雲馨公大和尚弘傳戒法三昧光公大和尚中興止作見月體公大和尚此下復續入座上師之得戒本師和尚諱惟願不違本誓慈光攝照證明受戒如前香煙迎香煙請沙彌尼某甲等一心奉請光明會上寄位諸天梵釋四王天龍八部伽藍土地護戒神王金剛力士幽顯靈祇惟願各乘本誓監壇護戒如是伸請已舉十師仍就座跏趺而坐侍者下壇引禮復位新戒拜已引禮云問訊右云長跪雙手撩衣莫跪具上合掌和尚撫尺云通啟三寶已竟眾引禮大德將沙彌尼等安置眼見耳不聞處立引禮云一拜起具右云問訊左云分班諸引贊仍將大衣散還令各自捧之二引禮師對立沙彌尼班前引禮云諸沙彌尼汝等隨我音聲一齊念佛出壇南無本師釋迦牟尼佛二引禮雙鳴引磬在前口稱佛號出壇至屏處佛號方歇引禮復回壇中和合集僧若是戒場作法集僧惟是壇上十師餘者盡出九僧集約界法壇主云僧集否第十師答僧已集問和合否答和合問未受具戒者出否答已出問不來諸比丘尼說欲有否說欲者答有出眾向上一拜問訊長跪合掌作如是說大姉僧聽比丘尼某甲我受彼欲彼如法僧事與欲羯磨壇主云善答爾一叩而起問訊歸班若在戒場或結小界說戒不必問欲僧今和合何所作為答受具足戒羯磨和尚云差教授出羯磨師出位向上一拜歸位合掌如是白云十差教授師法大姉僧聽彼沙彌尼某甲等從和尚尼上某下某律師求受大戒若僧時到僧忍聽某甲為教授師白如是問云作白成否七證合掌齊答云成十一教授師出眾問難法教授師出眾向上一拜從右頰下左轉至香案前一問訊出右頰門至屏處引贊尼先領受戒人至屏處香案前立第三人在左第二人在右第一人在第三位肩下二引贊將彼三人大衣放於桌上取彼壇籤安在師前教授師至位引贊師作如是言一齊向上排班為首者居中餘二人即轉身一齊向上引贊云作禮教授師三拜撩衣護鉢師云一拜暫云問訊長跪合掌教授師撫尺云諸沙彌尼壇上諸師作法差我下來問汝三人遮難汝莫恐怖須臾之間令汝三人陞於寶壇受具足戒成大比丘尼入三寶數此非小緣當生慶幸此是安陀會此鬱多羅僧此僧伽黎西土僧尼謂無內服故比丘畜持三衣比丘尼畜持五衣以幃身覆肩掩腋故東震則有內衣所著不露形體若無僧祇支覆肩衣不問亦可此鉢多羅今此衣鉢是汝三人有否答有教授師云既有受持披著引贊將大衣散彼十中領彼受云大姉一心念我沙彌尼某甲此僧伽黎二十五條衣受四長一短割截衣持三說師云如法受持答爾三人即起如前班立引贊為彼三人搭起大衣已如前跪下師撫尺云諸沙彌尼諦聽今是真誠時實語時我今問汝實富言實不實當言不實汝三人不犯邊罪不答無問汝犯淨行比丘不答無問汝非賊心受戒不答非問汝不破內外道不答無汝非黃門不答非汝非弑父不答無汝非弑母不答無汝非弑阿羅漢不答無汝非破和合僧不答無汝非惡心出佛身血不答無汝非非人不答非汝非畜生不答非汝非二根不答非汝字何等答某甲和尚字誰答上某下某大和尚年歲滿不答滿衣鉢具不答具父母夫主聽不答聽汝不負債不答無汝非婢不答非汝是女人不答是女人有如是諸病癩癰疽白癩乾痟顛狂二形二道合道小常漏大小便涕吐常流出汝有如此病不答無既無重難輕遮戒可得受如我向問汝事僧中亦當如是問如汝向者答我眾僧中亦當如是答一拜起具隨我登壇次第隨師而行十二白召人眾法佛言彼教授師問已來至眾中將近戒壇令沙彌尼止立瞻觀壇上教授師居中向壇上合掌問訊已作白召言大姉僧聽彼沙彌尼某甲等從和尚尼上某下某律師求受大戒若僧時到僧忍聽我已教授竟聽使來白如是和尚云喚將來師一問訊轉身面向沙彌尼招手召之云諸沙彌尼汝等來沙彌尼聞召具儀前行入壇師移步詣香案右邊而立語云汝等一齊近香案前到已問訊長跪居中者拈香一瓣供養壇上諸師拈香云一拜而起再問訊隨我登壇乞戒十三從僧乞戒法教授師前行沙彌尼隨後向西繞至壇後脫履陞第二級向東北至東南陞第三級師歸本座前合掌而立沙彌尼次第上壇面向和尚三位並立師教云問訊展大具至誠頂禮三拜撩衣護鉢拜已問訊長跪雙手提衣跪下合掌善女人等懇切至誠仰憑清眾求哀乞戒乞戒之語汝合自陳恐汝未能我今教汝各稱法名稱已其餘言詞皆隨我道大姉僧聽我沙彌尼某甲從和尚尼上某下某律師求受大戒我沙彌尼某甲今從眾僧乞受大戒和尚尼上某下某律師願僧濟度我慈愍故三說師云頂禮一拜教授師就本座而坐十四戒師單白法羯磨師於本座合掌先作單白羯磨已然後問難如是白云大姉僧聽此沙彌尼某甲等從和尚尼上某下某律師求受大戒此某甲等今從眾僧乞受大戒和尚尼上某下某律師若僧時到僧忍聽我問諸難事白如是問云作白成否七證答云成十五正問難遮法羯磨師云汝三人諦聽今是真誠時我今問汝有當言有無當言無汝不犯邊罪耶答無汝不犯比丘耶答無汝非賊心受戒耶答無汝非破內外道耶無汝非黃門耶答非汝不弑父耶答無汝不弑母耶答無汝不弑阿羅漢耶答無汝不破和合僧耶答無汝不惡心出佛身血耶答無汝非非人耶答非汝非畜生耶答非汝非二形耶答非汝字何等答某甲和尚字誰答上某下某大和尚年歲滿否答滿衣鉢具不答具父母夫主聽汝否答聽汝不負人債不答無汝非婢不答非汝是女人不答是女人有如是諸病癩癰疽白癩乾痟顛狂二形二道合道小常漏大小便㖒唾常流出汝有如是病不答無十六開道發心法作持云彼和尚當隨機示導令發增上心便得增上戒和尚云善女人當知此戒尊重六道眾生多是戒障惟人得受而人中又有重難輕遮汝三人幸無遮難可為完全淨器當授汝戒但深上善戒廣周法界量等虗空要須發心緣境心境相應方得無作戒體境有兩種一者情境二者非情境有知覺者名為情境無知覺者名非情境汝等從無始以來于此境上造一切惡所以輪迴生死今我佛如來于此境上制一切戒解脫涅槃境無邊故惡亦無邊戒無盡故福亦無盡心有三品若發下品心只得下品戒若發中品心只得中品戒要發上品心方得上品戒何為中下品或者為名利故發心或為勝他故發心或為人天之樂故而乃發心此名中下品此心劣弱不得堅固何名上品心或為初果二果三果四果辟支佛果乃至三明六通禪定解脫無量功德而發心者乃名上品心此心究竟得大涅槃永離生死不受後有故論云若此戒法有形色者入汝身時當作天崩地裂之聲由是非色法故令汝不覺不知如此妙善戒法豈汝狹劣身心所能容受撫尺云汝善女人應當普緣一切情非情境發起上品殷重之心領受如來清淨妙戒正為汝秉白羯磨之時汝當眼觀壇儀耳聽羯磨音聲心中默默如是運想口裏不要答應自然得戒羯磨者先作單白疊事告僧次秉羯磨量其可否十七正授戒體法羯磨師合掌云惟願和尚大眾不悋慈悲布施其戒同心共秉慎勿異緣令此三人感發圓宗戒體將秉羯磨聽宣作白大姉僧聽此沙彌尼某甲等從和尚尼上某下某律師求受大戒此某甲等今從眾僧乞受大戒和尚尼上某下某律師某甲等自說清淨無諸難事年歲已滿衣鉢具足若僧時到僧忍聽今與某甲等受大戒和尚尼上某下某律師白如是問云作白成否七師答云成大姉僧聽此沙彌尼某甲等從和尚尼上某下某律師求受大戒此某甲等今從眾僧乞受大戒和尚尼上某下某律師某甲等自說清淨無諸難事年歲已滿衣鉢具足僧今為某甲等受大戒和尚尼上某下某律師誰諸大姉忍僧今為某甲等受大戒和尚尼上某下某律師者默然誰不忽者說問此是初羯磨成否七證答云成大姉僧聽此沙彌尼某甲等從和尚尼上某下某律師求受大戒此某甲等今從眾僧乞受大戒和尚尼上某下某律師某甲等自說清淨無諸難事年歲已滿衣鉢具足僧今為某甲等受大戒和尚尼上某下某律師誰諸大姉忍僧今為某甲等受大戒和尚尼上某下某律師者默然誰不忍者說問此是二羯磨成否七證答云成大姉僧聽此沙彌尼某甲等從和尚尼上某下某律師求受大戒此某甲等今從眾僧乞受大戒和尚尼上某下某律師某甲等自說清淨無諸難事年歲已滿衣鉢具足僧今為某甲等受大戒和尚尼上某下某律師誰諸大姉忍僧今為某甲等受大戒和尚尼上某下某律師者默然誰不忍者說問此是三羯磨成否七證答云成僧已忍與某甲等受大成竟和尚尼上某下某律師僧忍默然故是事如是持和尚尼復示云白四羯磨已竟汝三人得了本法戒體更當起增上心發堅固念往大僧中乞受大戒成大比丘尼廣度眾生化化不絕一拜起具上殿禮佛新戒摺具問訊徃右級下壇第二壇亦如上受一一受竟新戒起具問訊和尚云受戒已竟大眾同音念佛回向引禮呼云一齊向上排班右云聞磬聲頂禮三拜左云撩衣拜已右云起具左云問訊右云分班壇上九師如前排班向上頂禮三拜或云一拜問訊已十師未後前行從右級下壇左繞至壇前並立一班和尚如前立維那舉回向偈大眾同和受戒功德殊勝行無邊勝福皆回向十師一拜普願沉溺諸有情速往無量光佛剎如前十方三世一切佛一切菩薩摩訶薩如前摩訶般若波羅密十師一問訊十師禮畢回向偈完和尚轉身南面而立九師兩分二引禮先領新戒未後先行新戒走完第十師接上次第九第八乃至第二二引禮雙鳴引磬在和尚前新戒至方丈前站兩行合掌面面對跪候十師行過仍起雙行至方丈站班和尚至座前面南而立九師向尚三禮或一拜八字分開引禮呼云一齊向上排班聞磬聲禮謝三拜十師俱合掌撩衣拜已起具問訊分班和尚入室九師各回引禮呼云一齊向上排班禮謝眾位引禮師傅三拜首者云一拜起具問訊分班引禮散已新戒回堂十八本法尼往大僧中受戒法五分律云若作本法羯磨竟復集十比丘尼往比丘僧中乞受大戒准義加儀理無默徃或當日或次朝鳴椎集界內尼僧彼和尚尼應通白大僧尼和尚云世尊為我等制八敬法第四云式叉摩那學戒已從比丘僧乞受大戒當尊重恭敬盡形壽不可違今有某甲沙彌尼本部遵律問難羯磨授本法竟我等作法十比丘尼將彼諸受具者同至大僧中乞受大戒大姉僧和合忍不眾尼僧應齊答云可爾如是答已作法十比丘尼同諸引禮統領新戒徃大僧中
